type Mutation {
  # Messages
  createMessage(channelId: Snowflake!, input: CreateMessageInput!): Message!
  editMessage(channelId: Snowflake!, messageId: Snowflake!, input: EditMessageInput!): Message!
  deleteMessage(channelId: Snowflake!, messageId: Snowflake!): Boolean!
  bulkDeleteMessages(channelId: Snowflake!, messageIds: [Snowflake!]!): Boolean!
  crosspostMessage(channelId: Snowflake!, messageId: Snowflake!): Message!
