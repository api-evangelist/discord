# ─── Root Operations ───────────────────────────────────────────────────────────

type Query {
  # Users
  currentUser: User!
  user(id: Snowflake!): User

  # Guilds
  guild(id: Snowflake!): Guild
  currentUserGuilds(before: Snowflake, after: Snowflake, limit: Int, withCounts: Boolean): [Guild!]!

  # Channels
  channel(id: Snowflake!): Channel
  guildChannels(guildId: Snowflake!): [Channel!]!
  guildActiveThreads(guildId: Snowflake!): ThreadListResult!
  channelThreadsArchived(channelId: Snowflake!, type: String!, before: ISO8601DateTime, limit: Int): ThreadListResult!

  # Messages
  messages(channelId: Snowflake!, around: Snowflake, before: Snowflake, after: Snowflake, limit: Int): [Message!]!
  message(channelId: Snowflake!, messageId: Snowflake!): Message
  pinnedMessages(channelId: Snowflake!): [Message!]!

  # Roles
  guildRoles(guildId: Snowflake!): [Role!]!
  guildRole(guildId: Snowflake!, roleId: Snowflake!): Role

  # Members
  guildMember(guildId: Snowflake!, userId: Snowflake!): Member
  guildMembers(guildId: Snowflake!, limit: Int, after: Snowflake): [Member!]!
  searchGuildMembers(guildId: Snowflake!, query: String!, limit: Int): [Member!]!

  # Emojis
  guildEmojis(guildId: Snowflake!): [Emoji!]!
  guildEmoji(guildId: Snowflake!, emojiId: Snowflake!): Emoji

  # Stickers
  sticker(id: Snowflake!): Sticker
  guildStickers(guildId: Snowflake!): [Sticker!]!

  # Webhooks
  channelWebhooks(channelId: Snowflake!): [Webhook!]!
  guildWebhooks(guildId: Snowflake!): [Webhook!]!
  webhook(id: Snowflake!): Webhook

  # Invites
  invite(code: String!, withCounts: Boolean, withExpiration: Boolean, guildScheduledEventId: Snowflake): Invite
  channelInvites(channelId: Snowflake!): [Invite!]!
  guildInvites(guildId: Snowflake!): [Invite!]!

  # Voice
  voiceRegions: [VoiceRegion!]!
  guildVoiceRegions(guildId: Snowflake!): [VoiceRegion!]!

  # Stage instances
  stageInstance(channelId: Snowflake!): StageInstance

  # Scheduled events
  guildScheduledEvents(guildId: Snowflake!, withUserCount: Boolean): [GuildScheduledEvent!]!
  guildScheduledEvent(guildId: Snowflake!, eventId: Snowflake!, withUserCount: Boolean): GuildScheduledEvent
