  unpinMessage(channelId: Snowflake!, messageId: Snowflake!): Boolean!

  # Reactions
  createReaction(channelId: Snowflake!, messageId: Snowflake!, emoji: String!): Boolean!
  deleteOwnReaction(channelId: Snowflake!, messageId: Snowflake!, emoji: String!): Boolean!
  deleteUserReaction(channelId: Snowflake!, messageId: Snowflake!, emoji: String!, userId: Snowflake!): Boolean!
  deleteAllReactions(channelId: Snowflake!, messageId: Snowflake!): Boolean!

  # Channels
  createGuildChannel(guildId: Snowflake!, input: CreateChannelInput!): Channel!
  modifyChannel(channelId: Snowflake!, input: ModifyChannelInput!): Channel!
  deleteChannel(channelId: Snowflake!): Channel!
  modifyGuildChannelPositions(guildId: Snowflake!, positions: [ChannelPositionInput!]!): Boolean!
  startThread(channelId: Snowflake!, input: StartThreadInput!): Channel!
  joinThread(channelId: Snowflake!): Boolean!
  addThreadMember(channelId: Snowflake!, userId: Snowflake!): Boolean!
  leaveThread(channelId: Snowflake!): Boolean!
  removeThreadMember(channelId: Snowflake!, userId: Snowflake!): Boolean!

  # Guilds
  createGuild(input: CreateGuildInput!): Guild!
  modifyGuild(guildId: Snowflake!, input: ModifyGuildInput!): Guild!
  deleteGuild(guildId: Snowflake!): Boolean!
  leaveGuild(guildId: Snowflake!): Boolean!

  # Roles
  createGuildRole(guildId: Snowflake!, input: CreateRoleInput!): Role!
  modifyGuildRole(guildId: Snowflake!, roleId: Snowflake!, input: ModifyRoleInput!): Role!
  deleteGuildRole(guildId: Snowflake!, roleId: Snowflake!): Boolean!

  # Members
  addGuildMember(guildId: Snowflake!, userId: Snowflake!, input: AddGuildMemberInput!): Member
  modifyGuildMember(guildId: Snowflake!, userId: Snowflake!, input: ModifyGuildMemberInput!): Member!
  removeGuildMember(guildId: Snowflake!, userId: Snowflake!): Boolean!
  modifyCurrentMember(guildId: Snowflake!, input: ModifyCurrentMemberInput!): Member!
  addGuildMemberRole(guildId: Snowflake!, userId: Snowflake!, roleId: Snowflake!): Boolean!
  removeGuildMemberRole(guildId: Snowflake!, userId: Snowflake!, roleId: Snowflake!): Boolean!

  # Bans
  createGuildBan(guildId: Snowflake!, userId: Snowflake!, deleteMessageSeconds: Int): Boolean!
  removeGuildBan(guildId: Snowflake!, userId: Snowflake!): Boolean!
  bulkGuildBan(guildId: Snowflake!, userIds: [Snowflake!]!, deleteMessageSeconds: Int): BulkBanResult!

  # Emojis
  createGuildEmoji(guildId: Snowflake!, input: CreateEmojiInput!): Emoji!
  modifyGuildEmoji(guildId: Snowflake!, emojiId: Snowflake!, input: ModifyEmojiInput!): Emoji!
  deleteGuildEmoji(guildId: Snowflake!, emojiId: Snowflake!): Boolean!

  # Stickers
  createGuildSticker(guildId: Snowflake!, input: CreateStickerInput!): Sticker!
  modifyGuildSticker(guildId: Snowflake!, stickerId: Snowflake!, input: ModifyStickerInput!): Sticker!
  deleteGuildSticker(guildId: Snowflake!, stickerId: Snowflake!): Boolean!

  # Webhooks
  createWebhook(channelId: Snowflake!, input: CreateWebhookInput!): Webhook!
  modifyWebhook(webhookId: Snowflake!, input: ModifyWebhookInput!): Webhook!
  deleteWebhook(webhookId: Snowflake!): Boolean!
  executeWebhook(webhookId: Snowflake!, token: String!, input: ExecuteWebhookInput!): Message

  # Invites
  createChannelInvite(channelId: Snowflake!, input: CreateInviteInput!): Invite!
  deleteInvite(code: String!): Invite!

  # Application commands
  createGlobalApplicationCommand(applicationId: Snowflake!, input: ApplicationCommandInput!): ApplicationCommand!
  editGlobalApplicationCommand(applicationId: Snowflake!, commandId: Snowflake!, input: ApplicationCommandInput!): ApplicationCommand!
  deleteGlobalApplicationCommand(applicationId: Snowflake!, commandId: Snowflake!): Boolean!
  bulkOverwriteGlobalApplicationCommands(applicationId: Snowflake!, commands: [ApplicationCommandInput!]!): [ApplicationCommand!]!
  createGuildApplicationCommand(applicationId: Snowflake!, guildId: Snowflake!, input: ApplicationCommandInput!): ApplicationCommand!
  editGuildApplicationCommand(applicationId: Snowflake!, guildId: Snowflake!, commandId: Snowflake!, input: ApplicationCommandInput!): ApplicationCommand!
  deleteGuildApplicationCommand(applicationId: Snowflake!, guildId: Snowflake!, commandId: Snowflake!): Boolean!

  # Interaction responses
  createInteractionResponse(interactionId: Snowflake!, interactionToken: String!, input: InteractionResponseInput!): Boolean!
  editOriginalInteractionResponse(applicationId: Snowflake!, interactionToken: String!, input: EditMessageInput!): Message!
  deleteOriginalInteractionResponse(applicationId: Snowflake!, interactionToken: String!): Boolean!

  # Stage instances
  createStageInstance(input: CreateStageInstanceInput!): StageInstance!
  modifyStageInstance(channelId: Snowflake!, input: ModifyStageInstanceInput!): StageInstance!
  deleteStageInstance(channelId: Snowflake!): Boolean!

  # Scheduled events
  createGuildScheduledEvent(guildId: Snowflake!, input: CreateScheduledEventInput!): GuildScheduledEvent!
  modifyGuildScheduledEvent(guildId: Snowflake!, eventId: Snowflake!, input: ModifyScheduledEventInput!): GuildScheduledEvent!
  deleteGuildScheduledEvent(guildId: Snowflake!, eventId: Snowflake!): Boolean!

  # Auto moderation
  createAutoModerationRule(guildId: Snowflake!, input: AutoModerationRuleInput!): AutoModerationRule!
  modifyAutoModerationRule(guildId: Snowflake!, ruleId: Snowflake!, input: AutoModerationRuleInput!): AutoModerationRule!
  deleteAutoModerationRule(guildId: Snowflake!, ruleId: Snowflake!): Boolean!

  # Current user
  modifyCurrentUser(input: ModifyCurrentUserInput!): User!

  # Entitlements
  consumeEntitlement(applicationId: Snowflake!, entitlementId: Snowflake!): Boolean!
  createTestEntitlement(applicationId: Snowflake!, input: CreateTestEntitlementInput!): Entitlement!
  deleteTestEntitlement(applicationId: Snowflake!, entitlementId: Snowflake!): Boolean!
}

type Subscription {
  # Gateway real-time events (conceptual; Discord uses WebSocket Gateway)
  messageCreated(channelId: Snowflake): Message!
  messageUpdated(channelId: Snowflake): Message!
  messageDeleted(channelId: Snowflake): MessageDeleteEvent!
  reactionAdded(channelId: Snowflake): ReactionEvent!
  reactionRemoved(channelId: Snowflake): ReactionEvent!
  typingStarted(channelId: Snowflake): TypingStartEvent!
  presenceUpdated(guildId: Snowflake): PresenceUpdate!
  voiceStateUpdated(guildId: Snowflake): VoiceState!
  guildMemberAdded(guildId: Snowflake!): Member!
  guildMemberRemoved(guildId: Snowflake!): GuildMemberRemoveEvent!
  guildMemberUpdated(guildId: Snowflake!): Member!
  interactionCreated: Interaction!
  guildScheduledEventCreated(guildId: Snowflake): GuildScheduledEvent!
  guildScheduledEventUpdated(guildId: Snowflake): GuildScheduledEvent!
  autoModerationActionExecuted(guildId: Snowflake!): AutoModerationActionExecution!
}

