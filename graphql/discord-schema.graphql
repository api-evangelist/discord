# Conceptual GraphQL schema for Discord
# Derived from the Discord REST API object model (discord.com/developers/docs/reference)
# Discord does not expose a native GraphQL endpoint; this schema models the REST types.

scalar ISO8601DateTime
scalar Snowflake
scalar JSONObject
scalar URL

