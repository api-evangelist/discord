        idempotent: true
      call: rest-webhooks.deletewebhook
      with:
        webhook_id: tools.webhook_id
      outputParameters:
      - type: object
        mapping: $.
    - name: discord-execute-webhook
      description: Discord Execute webhook
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: rest-webhooks.executewebhook
      with:
        webhook_id: tools.webhook_id
