      call: rest-webhooks.modifywebhook
      with:
        webhook_id: tools.webhook_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: discord-delete-webhook
      description: Discord Delete webhook
      hints:
