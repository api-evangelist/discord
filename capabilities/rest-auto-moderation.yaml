    namespace: rest-auto-moderation
    baseUri: https://discord.com/api/v10
    description: Discord REST API — Auto Moderation business capability. Self-contained, no shared references.
    resources:
    - name: guilds-guild_id-auto-moderation-rules
      path: /guilds/{guild_id}/auto-moderation/rules
      operations:
      - name: listautomoderationrules
        method: GET
        description: Discord List auto moderation rules
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createautomoderationrule
        method: POST
        description: Discord Create auto moderation rule
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.DISCORD_API_KEY}}'
  exposes:
  - type: rest
    namespace: rest-auto-moderation-rest
    port: 8080
    description: REST adapter for Discord REST API — Auto Moderation. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/guilds/{guild-id}/auto-moderation/rules
      name: guilds-guild-id-auto-moderation-rules
      description: REST surface for guilds-guild_id-auto-moderation-rules.
      operations:
      - method: GET
        name: listautomoderationrules
        description: Discord List auto moderation rules
        call: rest-auto-moderation.listautomoderationrules
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createautomoderationrule
        description: Discord Create auto moderation rule
        call: rest-auto-moderation.createautomoderationrule
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rest-auto-moderation-mcp
    port: 9090
    transport: http
    description: MCP adapter for Discord REST API — Auto Moderation. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: discord-list-auto-moderation-rules
      description: Discord List auto moderation rules
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-auto-moderation.listautomoderationrules
      outputParameters:
      - type: object
        mapping: $.
    - name: discord-create-auto-moderation-rule
      description: Discord Create auto moderation rule
      hints:
