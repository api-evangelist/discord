naftiko: 1.0.0-alpha2
info:
  label: Discord REST API — Audit Log
  description: 'Discord REST API — Audit Log. 1 operations. Lead operation: Discord Get guild audit log. Self-contained Naftiko
    capability covering one Discord business surface.'
  tags:
  - Discord
  - Audit Log
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DISCORD_API_KEY: DISCORD_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-audit-log
    baseUri: https://discord.com/api/v10
    description: Discord REST API — Audit Log business capability. Self-contained, no shared references.
    resources:
    - name: guilds-guild_id-audit-logs
      path: /guilds/{guild_id}/audit-logs
      operations:
      - name: getguildauditlog
        method: GET
        description: Discord Get guild audit log
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: user_id
          in: query
          type: string
        - name: action_type
          in: query
          type: integer
        - name: before
          in: query
          type: string
        - name: after
          in: query
          type: string
        - name: limit
          in: query
          type: integer
    authentication:
      type: bearer
      token: '{{env.DISCORD_API_KEY}}'
  exposes:
  - type: rest
    namespace: rest-audit-log-rest
    port: 8080
    description: REST adapter for Discord REST API — Audit Log. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/guilds/{guild-id}/audit-logs
      name: guilds-guild-id-audit-logs
      description: REST surface for guilds-guild_id-audit-logs.
      operations:
      - method: GET
        name: getguildauditlog
        description: Discord Get guild audit log
        call: rest-audit-log.getguildauditlog
        with:
          user_id: rest.user_id
          action_type: rest.action_type
          before: rest.before
          after: rest.after
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rest-audit-log-mcp
    port: 9090
    transport: http
    description: MCP adapter for Discord REST API — Audit Log. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: discord-get-guild-audit-log
      description: Discord Get guild audit log
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-audit-log.getguildauditlog
      with:
        user_id: tools.user_id
        action_type: tools.action_type
        before: tools.before
        after: tools.after
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
