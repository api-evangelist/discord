naftiko: 1.0.0-alpha2
info:
  label: Discord HTTP API (Preview) — Gateway
  description: 'Discord HTTP API (Preview) — Gateway. 2 operations. Lead operation: Gateway. Self-contained Naftiko capability
    covering one Discord business surface.'
  tags:
  - Discord
  - Gateway
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DISCORD_API_KEY: DISCORD_API_KEY
capability:
  consumes:
  - type: http
    namespace: discord-gateway
    baseUri: https://discord.com/api/v10
    description: Discord HTTP API (Preview) — Gateway business capability. Self-contained, no shared references.
    resources:
    - name: gateway
      path: /gateway
      operations:
      - name: getgateway
        method: GET
        description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: gateway-bot
      path: /gateway/bot
      operations:
      - name: getbotgateway
        method: GET
        description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.DISCORD_API_KEY}}'
  exposes:
  - type: rest
    namespace: discord-gateway-rest
    port: 8080
    description: REST adapter for Discord HTTP API (Preview) — Gateway. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/gateway
      name: gateway
      description: REST surface for gateway.
      operations:
      - method: GET
        name: getgateway
        description: getgateway
        call: discord-gateway.getgateway
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/gateway/bot
      name: gateway-bot
      description: REST surface for gateway-bot.
      operations:
      - method: GET
        name: getbotgateway
        description: getbotgateway
        call: discord-gateway.getbotgateway
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: discord-gateway-mcp
    port: 9090
    transport: http
    description: MCP adapter for Discord HTTP API (Preview) — Gateway. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: getgateway
      description: getgateway
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: discord-gateway.getgateway
      outputParameters:
      - type: object
        mapping: $.
    - name: getbotgateway
      description: getbotgateway
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: discord-gateway.getbotgateway
      outputParameters:
      - type: object
        mapping: $.
